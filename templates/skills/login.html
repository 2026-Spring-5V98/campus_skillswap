{% extends 'base.html' %}
{% block title %}Login — Campus SkillSwap{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="auth-card card">
      <div class="card-header">
        <h2><i class="bi bi-box-arrow-in-right me-2"></i>Log In</h2>
      </div>
      <div class="card-body p-4">
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" autofocus>
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label">Password</label>
            <input type="password" name="password" id="id_password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-1">Log In</button>
        </form>
        <hr>
        <p class="text-center mb-0">No account? <a href="{% url 'register' %}">Register free</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
