{% extends 'base.html' %}

{% block title %}Delete Skill — Campus SkillSwap{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 text-center">
    <div class="card border-danger shadow-sm">
      <div class="card-body py-5">
        <h2 class="text-danger fw-bold">Delete Skill?</h2>
        <p class="lead my-3">Are you sure you want to delete <strong>{{ skill.title }}</strong>?</p>
        <p class="text-muted">This action cannot be undone.</p>

        <!-- POST to confirm delete; GET shows this page -->
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-5 me-2">Yes, Delete</button>
          <a href="{% url 'skill-detail' skill.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
